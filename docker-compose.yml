services:
  app:
    container_name: app
    env_file: .env
    environment:
      - DB_HOST=database
      - DB_PORT=5432
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@database:5432/${DB_NAME}
      - SMTP_HOST=mailpit
      - SMTP_PORT=1025
      # Uncomment the following lines if you want to enable polling for file watching on Windows
      # - CHOKIDAR_USEPOLLING=true
      # - CHOKIDAR_INTERVAL=500
    build:
      context: .
      target: dev
      dockerfile: Dockerfile
    ports:
      - "${PORT}:${PORT}"
    expose:
      - "${PORT}"
    tty: true
    volumes:
      - ./:/usr/src/app
      - /usr/src/app/node_modules
    links:
      - database
    depends_on:
      database:
        condition: service_healthy
      mailpit:
        condition: service_started
    networks:
      - supplykey_network
    restart: always

  database:
    image: postgres:18.2-trixie
    container_name: db-supplykey
    command: [
        "postgres",
        # "-c",
        # "io_method=io_uring",
        "-c",
        "ssl=off",
        "-c",
        "log_statement=all",
      ]
    env_file: ".env"
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
    ports:
      - "5433:5432"
    expose:
      - "5433"
    volumes:
      - "supplykey_pg_data:/var/lib/postgresql"
    restart: on-failure
    shm_size: 128mb
    healthcheck:
      test: ["CMD", "pg_isready", "-q", "-d", "${DB_NAME}", "-U", "${DB_USER}"]
      interval: 5s
      timeout: 3s
      retries: 3
    networks:
      - supplykey_network

  # Mailpit for local email testing
  mailpit:
    image: axllent/mailpit:latest
    container_name: mailpit-supplykey
    ports:
      - "1026:1025" # SMTP server port
      - "8026:8025" # Web UI port
    environment:
      - MP_SMTP_AUTH_ACCEPT_ANY=true
      - MP_SMTP_AUTH_ALLOW_INSECURE=true
      - MP_MAX_MESSAGES=1000
    restart: unless-stopped
    networks:
      - supplykey_network

volumes:
  supplykey_pg_data:

networks:
  supplykey_network:
